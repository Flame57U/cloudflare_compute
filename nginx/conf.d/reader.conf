# miniflux behind nginx, fed by the :443 SNI demux (stream-enabled/demux.conf).
# TLS is terminated here on a localhost-only port; the stream layer forwards
# the raw TLS for SNI=reader.yjjvip.uk to 127.0.0.1:8444.

server {
    listen 127.0.0.1:8444 ssl http2;
    server_name reader.yjjvip.uk;

    ssl_certificate     /etc/letsencrypt/live/reader.yjjvip.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/reader.yjjvip.uk/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 50m;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
    }
}

# Plain HTTP: serve ACME challenges, redirect everything else to HTTPS.
server {
    listen 80;
    listen [::]:80;
    server_name reader.yjjvip.uk;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}
