# SNI-based TLS demultiplexing on :443
# Routes by the TLS SNI hostname without terminating TLS here.
#   yjjvip.uk        -> xray  (xray terminates its own TLS, VLESS/xHTTP)
#   reader.yjjvip.uk -> local nginx HTTPS vhost (terminates TLS -> miniflux)
#   anything else    -> xray  (preserve existing camouflage / default)

map $ssl_preread_server_name $demux_upstream {
    reader.yjjvip.uk   127.0.0.1:8444;
    yjjvip.uk          127.0.0.1:8443;
    default            127.0.0.1:8443;
}

server {
    listen 443;
    listen [::]:443;
    ssl_preread on;
    proxy_pass $demux_upstream;
    proxy_timeout 300s;
}
