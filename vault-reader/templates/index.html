<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Vault Reader</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header id="topbar">
    <button id="toc-toggle" aria-label="目录">≡</button>
    <span id="note-title">选择一篇笔记开始阅读</span>
    <span id="page-indicator"></span>
    <button id="theme-toggle" aria-label="主题">◐</button>
  </header>

  <aside id="toc" class="hidden">
    <div class="toc-search">
      <input id="toc-filter" type="text" placeholder="筛选笔记…">
    </div>
    <div id="toc-list"></div>
  </aside>

  <main id="reader">
    <div id="content-wrap">
      <article id="content"><p class="hint">← 打开目录选一篇笔记</p></article>
    </div>
    <button id="prev-page" class="nav-btn" aria-label="上一页">‹</button>
    <button id="next-page" class="nav-btn" aria-label="下一页">›</button>
  </main>

<script src="/static/app.js"></script>
</body>
</html>
